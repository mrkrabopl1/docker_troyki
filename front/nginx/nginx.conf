server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    include /etc/nginx/mime.types;
    
    disable_symlinks off;
    
    # ============================================
    # ЗАКРЫТЬ ОТ ИНДЕКСАЦИИ
    # ============================================
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    
    # ============================================
    # ДОСТУП ТОЛЬКО ПО ПАРОЛЮ
    # ============================================
    auth_basic "Closed for testing";
    auth_basic_user_file /etc/nginx/.htpasswd;
    
    location / {
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }
    
    # Статика
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
    
    # Шрифты
    location ~* \.(ttf|woff|woff2|eot|otf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    location /proxy_backend/ {
        proxy_pass http://goapp1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;
    }
}