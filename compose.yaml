services:
  front:
    image: front-dev3-i          # ← оставь как было
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        API_URL: ${API_URL}
    container_name: front-dev3-c  # ← оставь как было
    ports:
      - "80:80"
    volumes:
      - ./front/images:/app/public/images:ro
      - ./front/htpasswd:/etc/nginx/.htpasswd:ro
    environment:
      - API_URL=${API_URL}
    depends_on:
      - goapp1
    networks:
      - front_networks
    restart: unless-stopped
  goapp1:
    container_name: goapp1
    image: goapp1:1.0.0
    volumes:
      - ./front/images:/app/front/images
    build:
      context: ./backend
      dockerfile: go.dockerfile
    env_file:
      - .env
    expose:
      - "8100"
    ports:
      - '8100:8100'
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - postgres_bridge
      - front_networks
    restart: unless-stopped

  postgres_db:
    container_name: postgres_db
    image: postgres:16.1-alpine3.18
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "temp_file_limit=10GB"
      - "-c"
      - "log_min_duration_statement=200ms"
      - "-c"
      - "idle_in_transaction_session_timeout=10s"
      - "-c"
      - "lock_timeout=1s"
      - "-c"
      - "statement_timeout=60s"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "listen_addresses='*'"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - ./backup/troyki.sql:/docker-entrypoint-initdb.d/troyki.sql
      - troyki-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G
    networks:
      - postgres_bridge

  redis:
    container_name: redis
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - postgres_bridge

  pgadmin:
    image: dpage/pgadmin4:7.2
    environment:
      PGADMIN_DEFAULT_EMAIL: "mr.krabopl12@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "12345"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    networks:
      - postgres_bridge

volumes:
  troyki-data:
  pgadmin-data:

networks:
  postgres_bridge:
    driver: bridge
  front_networks: